<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KeyProgrammer Parser — Web UI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>KeyProgrammer Parser (Web)</h1>
      <p class="subtitle">Temporary browser UI (no Node/npm required)</p>
    </header>

    <section class="controls">
      <label>Input Type</label>
      <div class="radio">
        <label><input type="radio" name="inputType" value="zip" checked> Zip File</label>
        <label><input type="radio" name="inputType" value="folder"> Folder</label>
      </div>

      <label for="inputPath">Input path (zip or folder)</label>
      <input id="inputPath" type="text" placeholder="C:\\path\\to\\folder or C:\\path\\to\\file.zip" />

      <label for="reportDir">Report folder</label>
      <input id="reportDir" type="text" placeholder="C:\\path\\to\\reports" />

      <div class="actions">
        <button id="startBtn">Start Parsing</button>
      </div>

      <progress id="progress" value="0" max="100"></progress>
    </section>

    <section class="console">
      <h2>Output</h2>
      <pre id="output"></pre>
    </section>

    <footer>
      <small>Using local Python: {{}}</small>
    </footer>
  </div>
  <script>
    const startBtn = document.getElementById('startBtn');
    const output = document.getElementById('output');
    const progress = document.getElementById('progress');

    startBtn.addEventListener('click', () => {
      const input = document.getElementById('inputPath').value.trim();
      const report = document.getElementById('reportDir').value.trim();
      if (!input || !report) {
        alert('Please enter both input path and report folder');
        return;
      }
      output.textContent = '';
      progress.removeAttribute('value');

      const url = `/start?input=${encodeURIComponent(input)}&report=${encodeURIComponent(report)}`;
      const evt = new EventSource(url);
      evt.onmessage = function(e) {
        // detect PROGRESS:nnn tokens
        const m = e.data.match(/^PROGRESS:(\d{1,3})$/);
        if (m) {
          progress.value = Math.min(100, Math.max(0, parseInt(m[1], 10)));
          return;
        }
        output.textContent += e.data + '\n';
        output.scrollTop = output.scrollHeight;
      }
      evt.addEventListener('done', function(e) {
        progress.value = 100;
        // payload is 'code|reportPath'
        const parts = e.data.split('|');
        const code = parts[0];
        const rpt = parts[1] || '';
        output.textContent += `\nCompleted with code: ${code}\n`;
        if (rpt) {
          const link = document.createElement('a');
          link.href = 'file:///' + rpt.replaceAll('\\\\', '/').replaceAll('\\', '/');
          link.target = '_blank';
          link.textContent = 'Open Report';
          output.appendChild(document.createElement('br'));
          output.appendChild(link);
          output.appendChild(document.createElement('br'));
        }
        evt.close();
      });
      evt.onerror = function(e) {
        output.textContent += '\nConnection error or process exited.\n';
        evt.close();
      }
    });
  </script>
</body>
</html>
